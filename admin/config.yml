backend:
  name: git-gateway
  branch: master

media_folder: "public/images/blog"
public_folder: "/personsite/images/blog"

site_url: https://fancy-khapse-77cef5.netlify.app
display_url: https://fancy-khapse-77cef5.netlify.app

collections:
  - name: "blog"
    label: "博客文章"
    folder: "src/content/blog"
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    extension: "mdx"
    format: "frontmatter"
    fields:
      - label: "标题"
        name: "title"
        widget: "string"
        required: true
      - label: "发布日期"
        name: "date"
        widget: "datetime"
        format: "YYYY-MM-DD"
        date_format: "YYYY-MM-DD"
        time_format: false
        required: true
      - label: "标签"
        name: "tags"
        widget: "list"
        allow_add: true
        default: []
      - label: "摘要"
        name: "excerpt"
        widget: "text"
        required: true
        hint: "简短的摘要，显示在文章列表中"
      - label: "正文"
        name: "body"
        widget: "markdown"
        required: true
